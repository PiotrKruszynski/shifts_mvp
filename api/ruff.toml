line-length = 120     
indent-width = 4          
fix = true               
target-version = "py314"   

[lint]
select = [
  "E","W","F","UP","B","C4","I","SIM",
  "D","N","FA","ICN","RET","ISC",
  "TID","TC","PTH","TD","NPY","PT","T20","S","ANN","TCH"
]
ignore = ["E501","W191","E111","E114","E117","B008","C901","D100","D104"]

[lint.per-file-ignores]
"__init__.py"  = ["F401"]
"tests/**/*.py" = ["S101","D101","D102","D103"]
"src/app/api/routes/mvp.py" = ["D103"]
"src/app/services/mvp.py" = ["D102","D103","D107","TC003"]
"src/app/db/repository.py" = ["D102","D107","TC003"]
"src/app/db/seed.py" = ["D103","S105","TC003"]
"src/app/db/reset.py" = ["TC003"]
"src/app/db/session.py" = ["TC003"]
"src/app/schemas/common.py" = ["D101"]
"migrations/*" = ["E501"]

[lint.isort]
section-order     = ["future","standard-library","third-party","first-party","local-folder"]

[lint.pydocstyle]
convention = "google"

[lint.pyupgrade]
keep-runtime-typing = true

[format]
quote-style  = "double"
indent-style = "space"
line-ending  = "lf"

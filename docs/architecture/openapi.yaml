openapi: 3.1.0
info:
  title: Medical Duty Scheduling API
  summary: SaaS API for managing 24-hour medical duty schedules, availability, leave requests and shift swaps.
  description: >-
    API contract for an MVP system supporting Admin, Coordinator and Doctor roles.
    The system manages departments, doctors, 24-hour shifts, availability declarations,
    deterministic schedule generation, publication, post-publication swaps, audit logs,
    notifications and calendar exports.
  version: 0.1.0
servers:
  - url: https://api.dyzury.example.com/v1
    description: Production placeholder
  - url: https://staging-api.dyzury.example.com/v1
    description: Staging placeholder
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Departments
  - name: Doctors
  - name: Invitations
  - name: Configuration
  - name: Schedules
  - name: Availability
  - name: Shifts
  - name: Assignments
  - name: Generation
  - name: Validation
  - name: LeaveRequests
  - name: Swaps
  - name: Metrics
  - name: Notifications
  - name: CalendarExports
  - name: Audit

paths:
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      summary: Authenticate user with email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      security: []
      summary: Refresh access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refreshed token pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Return current authenticated user.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password-reset-requests:
    post:
      tags: [Auth]
      operationId: requestPasswordReset
      security: []
      summary: Request a password reset email for an existing account.
      description: >-
        MVP endpoint used by the reset-password UI. The response is intentionally
        non-enumerating so callers cannot infer whether the email exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Password reset request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List system users.
      x-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/RoleCode'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
      responses:
        '200':
          description: Users list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      operationId: createUser
      summary: Create system user.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      operationId: getUser
      summary: Get user by ID.
      x-roles: [ADMIN]
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      operationId: updateUser
      summary: Update user profile or status.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/{userId}/roles:
    parameters:
      - $ref: '#/components/parameters/UserId'
    put:
      tags: [Users]
      operationId: replaceUserRoles
      summary: Replace all role assignments for a user.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleReplacementRequest'
      responses:
        '200':
          description: Updated user roles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'

  /departments:
    get:
      tags: [Departments]
      operationId: listDepartments
      summary: List departments.
      x-roles: [ADMIN, COORDINATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Departments list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentListResponse'
    post:
      tags: [Departments]
      operationId: createDepartment
      summary: Create department.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentCreateRequest'
      responses:
        '201':
          description: Department created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'

  /departments/coordinator-summaries:
    get:
      tags: [Departments]
      operationId: listDepartmentCoordinatorSummaries
      summary: List department coordinator assignment summaries for Admin overview.
      description: >-
        Returns the MVP Admin Departments table read model without requiring
        the frontend to join departments, users, doctor counts and active schedules.
      x-roles: [ADMIN]
      responses:
        '200':
          description: Department coordinator summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentCoordinatorSummaryListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /departments/{departmentId}:
    parameters:
      - $ref: '#/components/parameters/DepartmentId'
    get:
      tags: [Departments]
      operationId: getDepartment
      summary: Get department by ID.
      x-roles: [ADMIN, COORDINATOR]
      responses:
        '200':
          description: Department.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Departments]
      operationId: updateDepartment
      summary: Update department.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentUpdateRequest'
      responses:
        '200':
          description: Updated department.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'

  /departments/{departmentId}/coordinator:
    parameters:
      - $ref: '#/components/parameters/DepartmentId'
    put:
      tags: [Departments]
      operationId: assignCoordinatorToDepartment
      summary: Assign active coordinator to department.
      description: Replaces the active coordinator assignment for the department.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoordinatorAssignmentRequest'
      responses:
        '200':
          description: Active coordinator assignment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorAssignment'

  /doctor-profiles:
    get:
      tags: [Doctors]
      operationId: listDoctorProfiles
      summary: List doctor profiles.
      x-roles: [ADMIN, COORDINATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: departmentId
          in: query
          schema:
            $ref: '#/components/schemas/Id'
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Doctor profiles list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorProfileListResponse'
    post:
      tags: [Doctors]
      operationId: createDoctorProfile
      summary: Create doctor profile for an existing user.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorProfileCreateRequest'
      responses:
        '201':
          description: Doctor profile created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorProfile'

  /doctor-profiles/me/context:
    get:
      tags: [Doctors]
      operationId: getCurrentDoctorContext
      summary: Return current doctor's profile context for Doctor views.
      x-roles: [DOCTOR]
      responses:
        '200':
          description: Current doctor context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentDoctorContext'
        '404':
          $ref: '#/components/responses/NotFound'

  /doctor-profiles/{doctorProfileId}:
    parameters:
      - $ref: '#/components/parameters/DoctorProfileId'
    get:
      tags: [Doctors]
      operationId: getDoctorProfile
      summary: Get doctor profile.
      x-roles: [ADMIN, COORDINATOR, DOCTOR]
      responses:
        '200':
          description: Doctor profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorProfile'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Doctors]
      operationId: updateDoctorProfile
      summary: Update doctor profile.
      x-roles: [ADMIN, COORDINATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorProfileUpdateRequest'
      responses:
        '200':
          description: Updated doctor profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorProfile'

  /doctor-invitations:
    get:
      tags: [Invitations]
      operationId: listDoctorInvitations
      summary: List doctor invitations.
      x-roles: [ADMIN, COORDINATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: departmentId
          in: query
          schema:
            $ref: '#/components/schemas/Id'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/InvitationStatus'
      responses:
        '200':
          description: Doctor invitations list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorInvitationListResponse'
    post:
      tags: [Invitations]
      operationId: createDoctorInvitation
      summary: Invite doctor to a department and optional schedule.
      x-roles: [COORDINATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorInvitationCreateRequest'
      responses:
        '201':
          description: Invitation created and email queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorInvitation'

  /doctor-invitations/{invitationId}/resend:
    parameters:
      - $ref: '#/components/parameters/InvitationId'
    post:
      tags: [Invitations]
      operationId: resendDoctorInvitation
      summary: Resend doctor invitation email.
      x-roles: [COORDINATOR]
      responses:
        '200':
          description: Invitation email queued again.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorInvitation'

  /doctor-invitations/accept:
    post:
      tags: [Invitations]
      operationId: acceptDoctorInvitation
      security: []
      summary: Accept invitation and create doctor account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        '201':
          description: Account activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'

  /preference-categories:
    get:
      tags: [Configuration]
      operationId: listPreferenceCategories
      summary: List configured preference categories.
      x-roles: [ADMIN, COORDINATOR, DOCTOR]
      responses:
        '200':
          description: Preference categories.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PreferenceCategory'
    post:
      tags: [Configuration]
      operationId: createPreferenceCategory
      summary: Create preference category.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceCategoryCreateRequest'
      responses:
        '201':
          description: Preference category created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceCategory'

  /constraint-rules:
    get:
      tags: [Configuration]
      operationId: listConstraintRules
      summary: List hard and soft constraint rules.
      x-roles: [ADMIN, COORDINATOR]
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/ConstraintType'
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Constraint rules.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConstraintRule'

  /system-settings:
    get:
      tags: [Configuration]
      operationId: getSystemSettings
      summary: Get MVP scheduling and notification settings.
      x-roles: [ADMIN]
      responses:
        '200':
          description: System settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags: [Configuration]
      operationId: saveSystemSettings
      summary: Replace MVP scheduling and notification settings.
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettingsUpdateRequest'
      responses:
        '200':
          description: Updated system settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
        '422':
          $ref: '#/components/responses/ValidationError'

  /schedules:
    get:
      tags: [Schedules]
      operationId: listSchedules
      summary: List schedules visible to the user.
      x-roles: [ADMIN, COORDINATOR, DOCTOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: departmentId
          in: query
          schema:
            $ref: '#/components/schemas/Id'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ScheduleStatus'
        - name: periodFrom
          in: query
          schema:
            $ref: '#/components/schemas/Date'
        - name: periodTo
          in: query
          schema:
            $ref: '#/components/schemas/Date'
      responses:
        '200':
          description: Schedules list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
    post:
      tags: [Schedules]
      operationId: createSchedule
      summary: Create schedule draft.
      x-roles: [COORDINATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleCreateRequest'
      responses:
        '201':
          description: Schedule draft created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '422':
          $ref: '#/components/responses/ValidationError'

  /schedules/current:
    get:
      tags: [Schedules]
      operationId: getCurrentSchedule
      summary: Return the current schedule for the authenticated user's active flow.
      description: >-
        Used by doctor-scoped and coordinator dashboard flows to discover the
        schedule ID before calling schedule-scoped operations.
      x-roles: [COORDINATOR, DOCTOR]
      parameters:
        - name: roleContext
          in: query
          schema:
            type: string
            enum: [COORDINATOR, DOCTOR]
        - name: departmentId
          in: query
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: Current schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '404':
          $ref: '#/components/responses/NotFound'

  /schedules/{scheduleId}:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Schedules]
      operationId: getSchedule
      summary: Get schedule details.
      x-roles: [ADMIN, COORDINATOR, DOCTOR]
      responses:
        '200':
          description: Schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Schedules]
      operationId: updateScheduleDraft
      summary: Update schedule metadata while editable.
      x-roles: [COORDINATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleUpdateRequest'
      responses:
        '200':
          description: Updated schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '409':
          description: Schedule status does not allow the requested update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /schedules/{scheduleId}/coordinator-dashboard:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Schedules]
      operationId: getCoordinatorDashboardSchedule
      summary: Return coordinator dashboard read model for one schedule.
      x-roles: [COORDINATOR]
      responses:
        '200':
          description: Coordinator dashboard schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorDashboardSchedule'
        '404':
          $ref: '#/components/responses/NotFound'

  /schedules/{scheduleId}/doctor-dashboard:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Schedules]
      operationId: getDoctorDashboardData
      summary: Return current doctor's dashboard read model for one schedule.
      x-roles: [DOCTOR]
      responses:
        '200':
          description: Doctor dashboard data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorDashboardData'
        '404':
          $ref: '#/components/responses/NotFound'

  /schedules/{scheduleId}/doctor-schedule:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Schedules]
      operationId: getDoctorSchedule
      summary: Return current doctor's schedule view for one published schedule.
      x-roles: [DOCTOR]
      responses:
        '200':
          description: Doctor schedule view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorScheduleView'
        '404':
          $ref: '#/components/responses/NotFound'

  /schedules/{scheduleId}/editor-view:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Schedules]
      operationId: getScheduleEditorView
      summary: Return schedule editor read model for Coordinator review.
      description: >-
        MVP read model for the generated schedule editor. It combines schedule
        metadata, display labels, shift assignment rows and current conflicts.
      x-roles: [COORDINATOR]
      responses:
        '200':
          description: Schedule editor view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleEditorView'
        '404':
          $ref: '#/components/responses/NotFound'

  /schedules/{scheduleId}/availability-collection-view:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Availability]
      operationId: getAvailabilityCollection
      summary: Return coordinator availability collection read model.
      x-roles: [COORDINATOR]
      responses:
        '200':
          description: Availability collection view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityCollectionView'
        '404':
          $ref: '#/components/responses/NotFound'

  /schedules/{scheduleId}/participants:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Schedules]
      operationId: listScheduleParticipants
      summary: List doctors participating in a schedule.
      x-roles: [COORDINATOR]
      responses:
        '200':
          description: Participants.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScheduleParticipant'
    post:
      tags: [Schedules]
      operationId: addScheduleParticipant
      summary: Add doctor to schedule participant pool.
      x-roles: [COORDINATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleParticipantCreateRequest'
      responses:
        '201':
          description: Participant added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleParticipant'

  /schedules/{scheduleId}/participants/{doctorProfileId}:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
      - $ref: '#/components/parameters/DoctorProfileId'
    delete:
      tags: [Schedules]
      operationId: removeScheduleParticipant
      summary: Remove doctor from editable schedule participant pool.
      x-roles: [COORDINATOR]
      responses:
        '204':
          description: Participant removed.
        '409':
          description: Cannot remove doctor because schedule is published or assignments exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /schedules/{scheduleId}/availability:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Availability]
      operationId: listScheduleAvailability
      summary: List all availability declarations for a schedule.
      x-roles: [COORDINATOR]
      responses:
        '200':
          description: Availability declarations.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailabilityDeclaration'

  /schedules/{scheduleId}/availability/me:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
    get:
      tags: [Availability]
      operationId: getMyAvailability
      summary: Get current doctor's availability declaration for a schedule.
      x-roles: [DOCTOR]
      responses:
        '200':
          description: Availability declaration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityDeclaration'
    put:
      tags: [Availability]
      operationId: submitMyAvailability
      summary: Create or replace current doctor's availability before the deadline.
      x-roles: [DOCTOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilitySubmissionRequest'
      responses:
        '200':
          description: Availability saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityDeclaration'
        '409':
          description: Availability deadline has passed or schedule is not editable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /schedules/{scheduleId}/availability/{doctorProfileId}:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
      - $ref: '#/components/parameters/DoctorProfileId'
    get:
      tags: [Availability]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    UserId:
      name: userId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    DepartmentId:
      name: departmentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    DoctorProfileId:
      name: doctorProfileId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    InvitationId:
      name: invitationId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    ScheduleId:
      name: scheduleId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    ShiftId:
      name: shiftId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    GenerationRunId:
      name: generationRunId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    LeaveRequestId:
      name: leaveRequestId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    SwapRequestId:
      name: swapRequestId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    CalendarExportId:
      name: calendarExportId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    IcsToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 32

  responses:
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user does not have the required role or scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Id:
      type: string
      format: uuid
    Date:
      type: string
      format: date
    Timestamp:
      type: string
      format: date-time

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [VALIDATION_ERROR]
        message:
          type: string
        details:
          type: array
          items:
            type: object
            additionalProperties: true

    PageMeta:
      type: object
      required: [page, limit, total]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    RoleCode:
      type: string
      enum: [ADMIN, COORDINATOR, DOCTOR]
    UserStatus:
      type: string
      enum: [ACTIVE, INVITED, SUSPENDED, DEACTIVATED]
    ScheduleStatus:
      type: string
      enum: [DRAFT, GENERATED, PUBLISHED, ARCHIVED]
    ScheduleParticipantStatus:
      type: string
      enum: [ACTIVE, REMOVED]
    ShiftStatus:
      type: string
      enum: [UNASSIGNED, ASSIGNED, CONFLICTED]
    AssignmentStatus:
      type: string
      enum: [PROPOSED, CONFIRMED, REPLACED, CANCELLED]
    AssignmentSource:
      type: string
      enum: [GENERATED, MANUAL, SWAP]
    AvailabilityDeclarationStatus:
      type: string
